<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maro Services Hub | Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="icon" type="image/png" href="./assets/logo1.png" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Maro Services Hub" />
  </head>
  <body data-page="admin">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="./index.html">
          <span class="brand-mark">MSH</span>
          <span class="brand-text">
            <strong>Maro Services Hub</strong>
            <small>Nigeria's service directory</small>
          </span>
        </a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Open navigation">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav">
          <a href="./index.html">Home</a>
          <a href="./listings.html">Listings</a>
          <a href="./add-business.html">Add Business</a>
          <a href="./dashboard.html">My Dashboard</a>
          <a href="./about.html">About</a>
          <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
            <span aria-hidden="true">&#9679;</span>
          </button>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="section">
        <div class="container">
          <div class="section-heading">
            <div>
              <span class="eyebrow">Admin access</span>
              <h1>Admin dashboard</h1>
            </div>
          </div>

          <form class="filters card" id="listings-filter-form" hidden>
            <label>
              Keyword or name
              <input type="text" name="keyword" id="filter-keyword" />
            </label>
            <label>
              Category
              <select name="category" id="filter-category">
                <option value="">All categories</option>
              </select>
            </label>
            <label>
              State
              <select name="state" id="filter-state">
                <option value="">All states</option>
              </select>
            </label>
            <label>
              Local Government
              <select name="localGovernment" id="filter-local-government">
                <option value="">All local governments</option>
              </select>
            </label>
            <div class="filter-actions">
              <button class="button button-primary" type="submit">Search</button>
              <button class="button button-secondary" type="button" id="reset-filters">Reset</button>
              <button class="button button-secondary" type="button" id="admin-toggle" hidden>Admin</button>
            </div>
          </form>

          <div class="results-meta" id="results-meta" hidden></div>
          <section class="admin-panel card" id="admin-panel" hidden>
            <div class="admin-panel-heading">
              <div>
                <span class="eyebrow">Admin queue</span>
                <h2>Pending businesses</h2>
              </div>
              <button class="button button-secondary" type="button" id="admin-refresh">Refresh</button>
            </div>
            <div class="results-meta" id="admin-pending-meta">Log in to view pending businesses.</div>
            <div class="admin-pending-list" id="admin-pending-list"></div>
            <div class="admin-panel-heading admin-reports-heading">
              <div>
                <span class="eyebrow">Trust reports</span>
                <h2>Business reports</h2>
              </div>
              <button class="button button-secondary" type="button" id="admin-reports-refresh">Refresh Reports</button>
            </div>
            <div class="results-meta" id="admin-reports-meta">Log in to view reports.</div>
            <div class="admin-report-list" id="admin-report-list"></div>
          </section>
          <div class="provider-grid" id="listings-grid" hidden></div>
        </div>
      </section>
    </main>

    <script src="./scripts/data.js"></script>
    <script src="./scripts/config.js"></script>
    <script src="./scripts/main.js"></script>
  </body>
</html>
